name: E2E Test Suite

on:
  push:
    branches:
      - 001-e2e-test-suite
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FIRESTORE_DATABASE: rio-test
      GOOGLE_CLOUD_PROJECT: riokutty
      PARALLEL_WORKFLOW_MAX_RETRIES: 4
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp-credentials.json
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -m e2e --timeout=300 -v --tb=short
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
          HUMAN_LOOP_NOTIFICATION_TOPIC: ${{ secrets.HUMAN_LOOP_NOTIFICATION_TOPIC }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: test/reports/
          retention-days: 30
